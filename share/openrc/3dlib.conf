# /etc/conf.d/3dlib — configuration for /etc/init.d/3dlib
#
# Install:
#   sudo cp /usr/local/3dlib/share/openrc/3dlib.conf /etc/conf.d/3dlib
#   sudo $EDITOR /etc/conf.d/3dlib

# Binary and bind address
THREEDLIB_BIN="/usr/local/bin/3dlib"
THREEDLIB_BIND="0.0.0.0"
THREEDLIB_PORT="31353"

# Run as this user:group (must be able to read/write /share/3d)
THREEDLIB_USER="cgf"
THREEDLIB_GROUP="cgf"

THREEDLIB_PIDFILE="/run/3dlib.pid"
THREEDLIB_LOG="/var/log/3dlib-serve.log"

# Library data and download_dir live on NFS under /share (see /etc/fstab).
# Do not start until network filesystems are mounted (trixie:/share, /share/tmp, …).
# OpenRC: rc_need is merged into the service's "need" dependencies.
rc_need="netmount"

# Optional: library root override (default /share/3d via config.json)
#THREEDLIB_ROOT="/share/3d"

# Optional web passwords (prefer not putting secrets in world-readable conf.d;
# use a root-only env file and source it, or set web.password in config.json).
#THREEDLIB_WEB_PASSWORD=""
#THREEDLIB_WEB_ADMIN_PASSWORD=""

# Optional FreeCAD remote launch, image viewer, etc. (see man 3dlib / README)
#THREEDLIB_FREECAD="ssh -Y tomoon freecad"
#THREEDLIB_IMAGE_VIEWER="feh"

# Export selected vars into the daemon environment
if [ -n "${THREEDLIB_ROOT}" ]; then
	export THREEDLIB_ROOT
fi
if [ -n "${THREEDLIB_WEB_PASSWORD}" ]; then
	export THREEDLIB_WEB_PASSWORD
fi
if [ -n "${THREEDLIB_WEB_ADMIN_PASSWORD}" ]; then
	export THREEDLIB_WEB_ADMIN_PASSWORD
fi
if [ -n "${THREEDLIB_FREECAD}" ]; then
	export THREEDLIB_FREECAD
fi
if [ -n "${THREEDLIB_IMAGE_VIEWER}" ]; then
	export THREEDLIB_IMAGE_VIEWER
fi
